kind = "web"
previewPath = "/working-instructions/"
title = "Capalyst QMS — Working Instructions"
version = "1.0.0"
id = "artifacts/working-instructions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/working-instructions/" ]
localPort = 26166

[services.development]
run = "pnpm --filter @workspace/working-instructions run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/working-instructions", "run", "build" ]
publicDir = "artifacts/working-instructions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26166"
BASE_PATH = "/working-instructions/"
