databases:
  - name: capalyst-db
    databaseName: capalyst
    user: capalyst
    plan: free
    region: oregon

services:
  - type: web
    name: capalyst-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: "pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"
    startCommand: "node --enable-source-maps artifacts/api-server/dist/index.mjs"
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: capalyst-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
