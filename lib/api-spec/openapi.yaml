openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Capalyst QMS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: deviations
  - name: capa
  - name: changecontrol
  - name: users
  - name: auth
  - name: audit
  - name: attachments
  - name: risk-assessment

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary KPIs
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/metrics:
    get:
      operationId: getDashboardMetrics
      tags: [dashboard]
      summary: Get deviation trend metrics for charts
      responses:
        "200":
          description: Metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /deviations:
    get:
      operationId: listDeviations
      tags: [deviations]
      summary: List all deviations
      parameters:
        - in: query
          name: flag
          schema:
            type: ["string", "null"]
        - in: query
          name: page
          schema:
            type: ["integer", "null"]
        - in: query
          name: pageSize
          schema:
            type: ["integer", "null"]
        - in: query
          name: search
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Deviations list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviationListResponse"

    post:
      operationId: createDeviation
      tags: [deviations]
      summary: Create a new deviation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deviation"

  /deviations/{id}:
    get:
      operationId: getDeviation
      tags: [deviations]
      summary: Get deviation detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deviation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deviation"

    patch:
      operationId: updateDeviation
      tags: [deviations]
      summary: Update deviation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deviation"

  /deviations/{id}/status-counts:
    get:
      operationId: getDeviationStatusCounts
      tags: [deviations]
      summary: Get deviation counts grouped by status (for dashboard cards)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusCounts"

  /deviations/{id}/similar:
    get:
      operationId: getSimilarDeviations
      tags: [deviations]
      summary: Get deviations with same location or root cause category in past 12 months
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Similar deviations
          content:
            application/json:
              schema:
                type: object
                required: [count, items]
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/DeviationSimilarItem"

  /deviations/{id}/related:
    get:
      operationId: getRelatedDeviations
      tags: [deviations]
      summary: Get deviations linked to this deviation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Related deviations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviationRelatedLink"

    post:
      operationId: addRelatedDeviation
      tags: [deviations]
      summary: Link a related deviation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviationLinkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviationRelatedLink"

  /deviations/{id}/related/{relatedId}:
    delete:
      operationId: removeRelatedDeviation
      tags: [deviations]
      summary: Remove a related deviation link
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: relatedId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /deviations/counts:
    get:
      operationId: getDeviationCounts
      tags: [deviations]
      summary: Get deviation counts grouped by status and type
      responses:
        "200":
          description: Counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviationCounts"

  /capa:
    get:
      operationId: listCapa
      tags: [capa]
      summary: List all CAPAs
      parameters:
        - in: query
          name: deviationId
          schema:
            type: ["integer", "null"]
        - in: query
          name: flag
          schema:
            type: ["string", "null"]
        - in: query
          name: page
          schema:
            type: ["integer", "null"]
        - in: query
          name: pageSize
          schema:
            type: ["integer", "null"]
        - in: query
          name: search
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: CAPA list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapaListResponse"

    post:
      operationId: createCapa
      tags: [capa]
      summary: Create a new CAPA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capa"

  /capa/{id}:
    get:
      operationId: getCapa
      tags: [capa]
      summary: Get CAPA detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: CAPA detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capa"

    patch:
      operationId: updateCapa
      tags: [capa]
      summary: Update CAPA
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapaUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capa"

  /capa/{id}/generate-cc:
    post:
      operationId: generateChangeControlFromCapa
      tags: [capa]
      summary: Generate a Change Control linked to this CAPA
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created Change Control
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeControl"

  /capa/{id}/reassign-impl-leader:
    post:
      operationId: reassignCapaImplLeader
      tags: [capa]
      summary: Reassign implementation leader for a CAPA
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapaImplLeaderReassign"
      responses:
        "200":
          description: Updated CAPA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capa"

  /capa/counts:
    get:
      operationId: getCapaCounts
      tags: [capa]
      summary: Get CAPA counts grouped by status
      responses:
        "200":
          description: Counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapaCounts"

  /changecontrol:
    get:
      operationId: listChangeControl
      tags: [changecontrol]
      summary: List all change controls
      parameters:
        - in: query
          name: flag
          schema:
            type: ["string", "null"]
        - in: query
          name: page
          schema:
            type: ["integer", "null"]
        - in: query
          name: pageSize
          schema:
            type: ["integer", "null"]
        - in: query
          name: search
          schema:
            type: ["string", "null"]
        - in: query
          name: capaId
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Change control list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeControlListResponse"

    post:
      operationId: createChangeControl
      tags: [changecontrol]
      summary: Create a new change control
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeControlInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeControl"

  /changecontrol/{id}:
    get:
      operationId: getChangeControl
      tags: [changecontrol]
      summary: Get change control detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Change control detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeControl"

    patch:
      operationId: updateChangeControl
      tags: [changecontrol]
      summary: Update change control
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeControlUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeControl"

  /changecontrol/{id}/close:
    post:
      operationId: closeChangeControl
      tags: [changecontrol]
      summary: Close a change control with a comment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeControlCloseInput"
      responses:
        "200":
          description: Closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeControl"

  /changecontrol/{id}/expert-reviews:
    get:
      operationId: listChangeControlExpertReviews
      tags: [changecontrol]
      summary: List expert review assignments for a change control
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expert reviews list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CcExpertReviewListResponse"

    post:
      operationId: createChangeControlExpertReviews
      tags: [changecontrol]
      summary: Create expert review assignments (start expert review phase)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CcExpertReviewBulkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CcExpertReviewListResponse"

  /changecontrol/{id}/expert-reviews/accept:
    post:
      operationId: acceptChangeControlExpertReviews
      tags: [changecontrol]
      summary: Accept all expert reviews (move to works plan)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeControl"

  /changecontrol/{id}/expert-reviews/reject:
    post:
      operationId: rejectChangeControlExpertReviews
      tags: [changecontrol]
      summary: Reject expert reviews with a reason
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeControlRejectInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeControl"

  /changecontrol/expert-reviews/{reviewId}:
    patch:
      operationId: submitChangeControlExpertReview
      tags: [changecontrol]
      summary: Submit an expert review (only the assigned manager may call this)
      parameters:
        - in: path
          name: reviewId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CcExpertReviewUpdate"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CcExpertReview"

  /changecontrol/expert-reviews/{reviewId}/reassign:
    patch:
      operationId: reassignChangeControlExpertReview
      tags: [changecontrol]
      summary: Reassign an expert review to a different manager (QA/Admin/SC only)
      parameters:
        - in: path
          name: reviewId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CcExpertReviewReassign"
      responses:
        "200":
          description: Reassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CcExpertReview"

  /changecontrol/{id}/work-plans:
    get:
      operationId: listChangeControlWorkPlans
      tags: [changecontrol]
      summary: List work plan items for a change control
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Work plans list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CcWorkPlanListResponse"

    post:
      operationId: createChangeControlWorkPlans
      tags: [changecontrol]
      summary: Create work plan items (start works plan phase)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CcWorkPlanBulkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CcWorkPlanListResponse"

  /changecontrol/work-plans/{planId}:
    delete:
      operationId: deleteChangeControlWorkPlan
      tags: [changecontrol]
      summary: Delete a work plan item
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

    patch:
      operationId: submitChangeControlWorkPlan
      tags: [changecontrol]
      summary: Submit a completed work plan item
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CcWorkPlanUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CcWorkPlan"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - in: query
          name: page
          schema:
            type: ["integer", "null"]
        - in: query
          name: pageSize
          schema:
            type: ["integer", "null"]
        - in: query
          name: search
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

    post:
      operationId: createUser
      tags: [users]
      summary: Create / add a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (Admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user role and department
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /user-role-definitions:
    get:
      operationId: listUserRoleDefinitions
      tags: [users]
      summary: List all defined user roles (built-in + custom)
      responses:
        "200":
          description: Role definitions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserRoleDefinition"
    post:
      operationId: createUserRoleDefinition
      tags: [users]
      summary: Create a new custom user role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleDefinitionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRoleDefinition"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Get currently logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /audit:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit log entries
      parameters:
        - in: query
          name: page
          schema:
            type: ["integer", "null"]
        - in: query
          name: pageSize
          schema:
            type: ["integer", "null"]
        - in: query
          name: module
          schema:
            type: ["string", "null"]
        - in: query
          name: search
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  /attachments:
    get:
      operationId: listAttachments
      tags: [attachments]
      summary: List attachments for a record
      parameters:
        - in: query
          name: module
          required: true
          schema:
            type: string
        - in: query
          name: recordId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttachmentMeta"

  /attachments/{id}:
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete an attachment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /deviations/{id}/generate-capa:
    post:
      operationId: generateCapaFromDeviation
      tags: [deviations]
      summary: Generate a CAPA from a deviation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created CAPA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capa"

  /capa/er:
    get:
      operationId: listEfficacyReviews
      tags: [capa]
      summary: List all efficacy reviews
      parameters:
        - in: query
          name: capaId
          schema:
            type: ["integer", "null"]
        - in: query
          name: flag
          schema:
            type: ["string", "null"]
        - in: query
          name: page
          schema:
            type: ["integer", "null"]
        - in: query
          name: pageSize
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Efficacy review list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfficacyReviewListResponse"

    post:
      operationId: createEfficacyReview
      tags: [capa]
      summary: Create a new efficacy review for a CAPA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EfficacyReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfficacyReview"

  /capa/er/{id}:
    get:
      operationId: getEfficacyReview
      tags: [capa]
      summary: Get efficacy review detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Efficacy review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfficacyReview"

    patch:
      operationId: updateEfficacyReview
      tags: [capa]
      summary: Update an efficacy review
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EfficacyReviewUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfficacyReview"

  /settings/options:
    get:
      operationId: listSettingOptions
      tags: [settings]
      summary: List configurable dropdown options, optionally filtered by category
      parameters:
        - in: query
          name: category
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of setting options
          content:
            application/json:
              schema:
                type: array
                items:
