components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    DashboardSummary:
      type: object
      required: [monthLabel, totalDeviations, newDeviations, closedDeviations, openCapa, capaDue30, changeControlsInReview, overdueDeviations, overdueErs]
      properties:
        monthLabel:
          type: string
        totalDeviations:
          type: integer
        newDeviations:
          type: integer
        closedDeviations:
          type: integer
        openCapa:
          type: integer
        capaDue30:
          type: integer
        changeControlsInReview:
          type: integer
        overdueDeviations:
          type: integer
        overdueErs:
          type: integer

    DashboardMetrics:
      type: object
      required: [labels, deviations, trendLabels, trendNew, trendClosed]
      properties:
        labels:
          type: array
          items:
            type: string
        deviations:
          type: array
          items:
            type: integer
        trendLabels:
          type: array
          items:
            type: string
        trendNew:
          type: array
          items:
            type: integer
        trendClosed:
          type: array
          items:
            type: integer

    ActivityItem:
      type: object
      required: [id, type, title, number, action, user, timestamp, status]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [deviation, capa, changecontrol]
        title:
          type: string
        number:
          type: string
        action:
          type: string
        user:
          type: string
        timestamp:
          type: string
        status:
          type: string

